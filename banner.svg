<svg width="900" height="280" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#0d1117"/>
      <stop offset="35%"  stop-color="#1a0a3d"/>
      <stop offset="70%"  stop-color="#7a4f00"/>
      <stop offset="100%" stop-color="#c9a227"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="strongGlow">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <style>
      @keyframes twinkle   { 0%,100%{opacity:.2} 50%{opacity:1} }
      @keyframes leoGlow   { 0%,100%{opacity:.5} 50%{opacity:1} }
      @keyframes lineFlash { 0%,100%{opacity:.15} 50%{opacity:.55} }
      @keyframes coinBob   { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-7px)} }
      @keyframes coinBob2  { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-5px)} }
      @keyframes titlePulse{
        0%,100%{filter:drop-shadow(0 0 5px #c9a227)}
        50%    {filter:drop-shadow(0 0 18px #ffd700) drop-shadow(0 0 30px #ffa500)}
      }
      @keyframes subFade   { 0%,100%{opacity:.8} 50%{opacity:1} }
      .bg-star  { animation:twinkle   3s infinite }
      .leo-line { animation:lineFlash 2.5s infinite }
      .leo-s    { animation:leoGlow  2.5s infinite }
      .regulus  { animation:leoGlow  1.8s infinite }
      .c1{animation:coinBob  2.4s ease-in-out infinite}
      .c2{animation:coinBob2 3s   ease-in-out infinite .4s}
      .c3{animation:coinBob  2.8s ease-in-out infinite .8s}
      .c4{animation:coinBob2 3.2s ease-in-out infinite 1.2s}
      .c5{animation:coinBob  2.6s ease-in-out infinite .6s}
      .title   { animation:titlePulse 3s ease-in-out infinite }
      .subtitle{ animation:subFade    4s ease-in-out infinite }
    </style>
  </defs>

  <!-- Background -->
  <rect width="900" height="280" fill="url(#bgGrad)"/>
  <!-- Wave hills at bottom -->
  <ellipse cx="200" cy="290" rx="280" ry="60" fill="#0d1117" opacity=".55"/>
  <ellipse cx="700" cy="295" rx="320" ry="65" fill="#0d1117" opacity=".45"/>
  <path d="M0,248 Q150,228 300,246 Q450,264 600,244 Q750,226 900,243 L900,280 L0,280Z" fill="#0d1117" opacity=".6"/>
  <path d="M0,260 Q200,244 400,258 Q600,272 900,256 L900,280 L0,280Z" fill="#0d1117" opacity=".75"/>

  <!-- Background stars -->
  <circle class="bg-star" cx="30"  cy="18"  r="1.2" fill="white" style="animation-delay:.0s"/>
  <circle class="bg-star" cx="75"  cy="8"   r="1"   fill="white" style="animation-delay:.3s"/>
  <circle class="bg-star" cx="140" cy="30"  r="1.5" fill="white" style="animation-delay:.7s"/>
  <circle class="bg-star" cx="210" cy="12"  r="1"   fill="white" style="animation-delay:1.1s"/>
  <circle class="bg-star" cx="270" cy="42"  r="1.2" fill="white" style="animation-delay:.5s"/>
  <circle class="bg-star" cx="340" cy="20"  r="1"   fill="white" style="animation-delay:1.5s"/>
  <circle class="bg-star" cx="390" cy="55"  r="1.5" fill="white" style="animation-delay:.2s"/>
  <circle class="bg-star" cx="460" cy="25"  r="1"   fill="white" style="animation-delay:.9s"/>
  <circle class="bg-star" cx="510" cy="10"  r="1.3" fill="white" style="animation-delay:1.3s"/>
  <circle class="bg-star" cx="570" cy="38"  r="1"   fill="white" style="animation-delay:.6s"/>
  <circle class="bg-star" cx="630" cy="18"  r="1.5" fill="white" style="animation-delay:1.7s"/>
  <circle class="bg-star" cx="690" cy="45"  r="1"   fill="white" style="animation-delay:.4s"/>
  <circle class="bg-star" cx="750" cy="22"  r="1.2" fill="white" style="animation-delay:1s"/>
  <circle class="bg-star" cx="820" cy="14"  r="1"   fill="white" style="animation-delay:.8s"/>
  <circle class="bg-star" cx="870" cy="35"  r="1.5" fill="white" style="animation-delay:1.6s"/>
  <circle class="bg-star" cx="50"  cy="60"  r="1"   fill="white" style="animation-delay:2s"/>
  <circle class="bg-star" cx="160" cy="65"  r="1.2" fill="white" style="animation-delay:.1s"/>
  <circle class="bg-star" cx="430" cy="72"  r="1.3" fill="white" style="animation-delay:.7s"/>
  <circle class="bg-star" cx="555" cy="60"  r="1"   fill="white" style="animation-delay:2.2s"/>
  <circle class="bg-star" cx="760" cy="58"  r="1.2" fill="white" style="animation-delay:1.9s"/>

  <!-- LEO Constellation top-left -->
  <g filter="url(#glow)">
    <line class="leo-line" x1="62"  y1="168" x2="62"  y2="146" stroke="#ffd700" stroke-width="1.2"/>
    <line class="leo-line" x1="62"  y1="146" x2="76"  y2="126" stroke="#ffd700" stroke-width="1.2"/>
    <line class="leo-line" x1="76"  y1="126" x2="86"  y2="102" stroke="#ffd700" stroke-width="1.2"/>
    <line class="leo-line" x1="86"  y1="102" x2="76"  y2="78"  stroke="#ffd700" stroke-width="1.2"/>
    <line class="leo-line" x1="76"  y1="78"  x2="54"  y2="72"  stroke="#ffd700" stroke-width="1.2"/>
    <line class="leo-line" x1="54"  y1="72"  x2="38"  y2="84"  stroke="#ffd700" stroke-width="1.2"/>
    <line class="leo-line" x1="38"  y1="84"  x2="62"  y2="146" stroke="#ffd700" stroke-width="1.2"/>
    <line class="leo-line" x1="86"  y1="102" x2="136" y2="114" stroke="#ffd700" stroke-width="1.2"/>
    <line class="leo-line" x1="136" y1="114" x2="158" y2="138" stroke="#ffd700" stroke-width="1.2"/>
    <line class="leo-line" x1="158" y1="138" x2="178" y2="124" stroke="#ffd700" stroke-width="1.2"/>
    <line class="leo-line" x1="178" y1="124" x2="136" y2="114" stroke="#ffd700" stroke-width="1.2"/>
    <line class="leo-line" x1="178" y1="124" x2="204" y2="106" stroke="#ffd700" stroke-width="1.2"/>
    <!-- Stars -->
    <circle class="regulus" cx="62"  cy="168" r="5.5" fill="#ffd700" filter="url(#strongGlow)"/>
    <circle class="leo-s"   cx="62"  cy="146" r="2.5" fill="#ffd700"/>
    <circle class="leo-s"   cx="76"  cy="126" r="3.5" fill="#ffd700" filter="url(#glow)"/>
    <circle class="leo-s"   cx="86"  cy="102" r="2.5" fill="#ffd700"/>
    <circle class="leo-s"   cx="76"  cy="78"  r="2"   fill="#ffd700"/>
    <circle class="leo-s"   cx="54"  cy="72"  r="2.5" fill="#ffd700"/>
    <circle class="leo-s"   cx="38"  cy="84"  r="2"   fill="#ffd700"/>
    <circle class="leo-s"   cx="136" cy="114" r="2.5" fill="#ffd700"/>
    <circle class="leo-s"   cx="158" cy="138" r="2.5" fill="#ffd700"/>
    <circle class="leo-s"   cx="178" cy="124" r="3"   fill="#ffd700" filter="url(#glow)"/>
    <circle class="leo-s"   cx="204" cy="106" r="4.5" fill="#ffd700" filter="url(#strongGlow)"/>
  </g>

  <!-- Coin Tree top-right -->
  <g transform="translate(808,50)">
    <rect x="17" y="115" width="6" height="50" rx="3" fill="#8b6b14"/>
    <line x1="20" y1="130" x2="2"  y2="110" stroke="#8b6b14" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="20" y1="130" x2="38" y2="112" stroke="#8b6b14" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="20" y1="118" x2="5"  y2="98"  stroke="#8b6b14" stroke-width="2"   stroke-linecap="round"/>
    <line x1="20" y1="118" x2="35" y2="98"  stroke="#8b6b14" stroke-width="2"   stroke-linecap="round"/>
    <line x1="20" y1="108" x2="20" y2="90"  stroke="#8b6b14" stroke-width="2"   stroke-linecap="round"/>
    <g class="c1"><circle cx="2"  cy="102" r="10" fill="#ffd700" stroke="#b8860b" stroke-width="1.5"/><text x="2"  y="107" text-anchor="middle" font-size="10" font-weight="bold" fill="#7a4f00">$</text></g>
    <g class="c2"><circle cx="38" cy="104" r="10" fill="#ffd700" stroke="#b8860b" stroke-width="1.5"/><text x="38" y="109" text-anchor="middle" font-size="10" font-weight="bold" fill="#7a4f00">$</text></g>
    <g class="c3"><circle cx="5"  cy="90"  r="9"  fill="#ffd700" stroke="#b8860b" stroke-width="1.5"/><text x="5"  y="95"  text-anchor="middle" font-size="9"  font-weight="bold" fill="#7a4f00">$</text></g>
    <g class="c4"><circle cx="35" cy="90"  r="9"  fill="#ffd700" stroke="#b8860b" stroke-width="1.5"/><text x="35" y="95"  text-anchor="middle" font-size="9"  font-weight="bold" fill="#7a4f00">$</text></g>
    <g class="c5"><circle cx="20" cy="80"  r="11" fill="#ffd700" stroke="#b8860b" stroke-width="2"/> <text x="20" y="85"  text-anchor="middle" font-size="11" font-weight="bold" fill="#7a4f00">$</text></g>
    <circle cx="8" cy="95" r="5" fill="#ffd700" opacity="0">
      <animate attributeName="cy"      from="95"  to="178" dur="2.8s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;.9;0"     dur="2.8s" repeatCount="indefinite"/>
    </circle>
    <circle cx="30" cy="100" r="4" fill="#ffd700" opacity="0">
      <animate attributeName="cy"      from="100" to="180" dur="2.3s" begin="1.2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;.9;0"     dur="2.3s" begin="1.2s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Motion path for lion+snake -->
  <path id="runPath" d="M-120,220 L1020,220" fill="none"/>

  <!-- LION emoji 🦁 -->
  <text font-size="62" text-anchor="middle" dominant-baseline="middle">
    🦁
    <animateMotion dur="12s" repeatCount="indefinite">
      <mpath href="#runPath"/>
    </animateMotion>
  </text>

  <!-- SNAKE emoji 🐍 positioned slightly above/behind lion -->
  <text font-size="38" text-anchor="middle" dominant-baseline="middle" dy="-38" dx="-10">
    🐍
    <animateMotion dur="12s" repeatCount="indefinite">
      <mpath href="#runPath"/>
    </animateMotion>
  </text>

  <!-- Title -->
  <text class="title" x="490" y="128"
        text-anchor="middle"
        font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif"
        font-size="54" font-weight="800" fill="#ffd700">Vinny Nguyen</text>

  <!-- Subtitle -->
  <text class="subtitle" x="490" y="165"
        text-anchor="middle"
        font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif"
        font-size="19" fill="#ffe580">Developer  |  Server  |  Vietnam</text>

</svg>
