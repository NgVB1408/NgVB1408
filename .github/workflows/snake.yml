name: generate snake

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:
  push:
    branches:
      - master

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: Platane/snk@v3
        id: snake-gif
        with:
          github_user_name: NgVB1408
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark&color_snake=c9a227&color_dots=e7d3a8,d4b87a,c9a227,a07d3c,8b4500
            dist/github-contribution-grid-snake.gif?color_snake=c9a227&color_dots=#0d1117,#3d1000,#8b4500,#c9a227,#e7d3a8

      - uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
